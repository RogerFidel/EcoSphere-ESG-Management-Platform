version: '3.9'

services:
  # ─── PostgreSQL Database ─────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: gq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-greenquest}
      POSTGRES_PASSWORD: ${DB_PASS:-greenquest_secret}
      POSTGRES_DB: ${DB_NAME:-greenquest}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-greenquest}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gq_network

  # ─── Redis Cache ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gq_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gq_network

  # ─── Backend API ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gq_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-greenquest}
      DB_PASS: ${DB_PASS:-greenquest_secret}
      DB_NAME: ${DB_NAME:-greenquest}
      REDIS_URL: redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - gq_network
    volumes:
      - ./backend/logs:/app/logs

  # ─── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gq_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - gq_network

  # ─── Database Admin (optional, development only) ──────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gq_pgadmin
    restart: unless-stopped
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@greenquest.io
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    networks:
      - gq_network
    depends_on:
      - postgres

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: gq_postgres_data
  redis_data:
    name: gq_redis_data

# ─── Networks ──────────────────────────────────────────────────────────────────
networks:
  gq_network:
    name: gq_network
    driver: bridge
